services:
  web:
    build:
      context: ./
    volumes:
      - .:/src
      - /src/node_modules
    command: supervisor -w index.js,app -e 'js,pug,html' index.js
    env_file:
      - ./.env
    ports:
      - "3000:3000"
    depends_on:
      - db
  db:
    image: mysql:8.0
    restart: always
    env_file:
      - ./.env
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./EcoShare.sql:/docker-entrypoint-initdb.d/init.sql
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    restart: always
    env_file:
      - ./.env
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
    ports:
      - "8081:80"

volumes:
  db_data:
